<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MY LIBRARY</h1>
    </div>
    <div class="content" id="content">
      <div class="book">
        <img src="covers/tokyoghoulcoverart.jpeg" alt="book" class="cover-art">
        <div class="info">
          <div class="name">Tokyo Ghoul</div>
          <div class="author">Sui Ishida</div>
          <div class="status">
            <label for="read-status">Read Status: </label>
            <select name="status" id="read-status">
              <option value="read">Read</option>
              <option value="not-read" selected>Not Read</option>
              <option value="reading">Reading</option>
            </select>
          </div>
        </div> 
      </div>
      <div class="book">
        <img src="covers/firepunchcoverart.jpg" alt="book" class="cover-art">
        <div class="info">
          <div class="name">Fire Punch</div>
          <div class="author">Tatatsuki Fujimoto</div>
          <div class="status">
            <label for="read-status">Read Status: </label>
            <select name="status" id="read-status">
              <option value="read">Read</option>
              <option value="not-read" selected>Not Read</option>
              <option value="reading">Reading</option>
            </select>
          </div>
        </div> 
      </div>
      <div class="book">
        <img src="covers/Blue_Box_Volume_6.jpg" alt="book" class="cover-art">
        <div class="info">
          <div class="name">Blue Box</div>
          <div class="author">Kouji Miura</div>
          <div class="status">
            <label for="read-status">Read Status: </label>
            <select name="status" id="read-status">
              <option value="read">Read</option>
              <option value="not-read" selected>Not Read</option>
              <option value="reading">Reading</option>
            </select>
          </div>
        </div> 
      </div>
      <div class="add" id="add">
        <div class="add-btn">
          <button type="button" id="add-book" command="show-modal" commandfor="my-dialog">
            <svg viewBox="-50 -50 100 100" width="100" height="100" fill="black">
              <circle r="40" fill="none" stroke-width="3" stroke="white" /> 
              <path d="M 0, -20 L 0, 20" stroke="white" stroke-width="5" />
              <path d="M -20, 0 L 20, 0" stroke="white" stroke-width="5" />
            </svg>
          </button>

          <dialog id="my-dialog">
            <form method="dialog"></form>
            <button type="submit">Submit</button>
          </dialog>
        </div>
      </div>
    </div>
  </div> 

  <script src="app.js"></script>
</body>
</html>
